name: Security Pipeline

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '.github/**'
      - '**.cs'
      - '**.ts'
      - '**.tsx'
      - '**.json'
      - '**.yaml'
      - 'Dockerfile*'
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '.github/**'
      - '**.cs'
      - '**.ts'
      - '**.tsx'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.x'
  NODE_VERSION: '20'

jobs:
  secrets-scanning:
    name: Hardcoded Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: goreleaser/gitleaks-action@v2
        with:
          config_path: .github/secrets-config.toml
        continue-on-error: true

      - name: Custom secrets patterns
        run: |
          # Check for common secret patterns
          echo "Scanning for hardcoded secrets..."

          # API keys
          if grep -rE "api[_-]?key\s*[=:]\s*['\"][A-Za-z0-9]{20,}" src/ --include="*.cs" --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "ERROR: Potential API key found"
            exit 1
          fi

          # Connection strings with credentials
          if grep -rE "connectionstring.*password\s*[=:]" src/ --include="*.cs" --include="*.json" 2>/dev/null; then
            echo "ERROR: Potential connection string with password found"
            exit 1
          fi

          # JWT secrets
          if grep -rE "jwtsecret|jwtsymmetrickey" src/ -i --include="*.cs" 2>/dev/null | grep -v "//.*jwt"; then
            echo "WARNING: Potential JWT secret found"
          fi

          echo "Secrets scan completed"

  dependency-review:
    name: Dependency Vulnerability Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          license-check: true
          vulnerability-check: true

  codeql-backend:
    name: CodeQL (.NET Backend)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'csharp'
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  codeql-frontend:
    name: CodeQL (TypeScript/React)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript-typescript'
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  nuget-audit:
    name: NuGet Vulnerability Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/apps/ums.api/Ums.sln

      - name: Check for vulnerable packages
        run: |
          VULN_OUTPUT=$(dotnet list src/apps/ums.api/Ums.sln package --vulnerable --include-transitive 2>&1)
          echo "$VULN_OUTPUT"

          if echo "$VULN_OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "ERROR: Vulnerable NuGet packages detected"
            exit 1
          fi
          echo "No vulnerable NuGet packages detected"

  npm-audit:
    name: npm Vulnerability Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit for vulnerabilities
        run: npm audit --audit-level=high

  dockerfile-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint Lint
        uses: hadolint/hadolint-action@v3
        with:
          dockerfile: Dockerfile
        continue-on-error: true

      - name: Build Docker image for scan
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t ums-app:test . --quiet
          fi

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ums-app:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-security-results@v2
        if: always()
        with:
          tool_name: 'Trivy'
          sarif_file: 'trivy-results.sarif'

  tenant-isolation-tests:
    name: Tenant Isolation Security Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run tenant isolation tests
        run: |
          dotnet test src/apps/ums.api/Ums.sln \
            --filter "FullyQualifiedName~TenantIsolation" \
            --logger "console;verbosity=minimal" \
            --no-build || echo "No tenant isolation tests found or tests failed"

  security-report:
    name: Security Scan Report
    runs-on: ubuntu-latest
    needs: [secrets-scanning, dependency-review, codeql-backend, codeql-frontend, nuget-audit, npm-audit]
    if: always()
    steps:
      - name: Generate security report
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "Generated: $(date -u)" >> security-report.md
          echo "Branch: ${{ github.ref }}" >> security-report.md
          echo "Commit: ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "- Secrets Scanning: ${{ needs.secrets-scanning.result }}" >> security-report.md
          echo "- Dependency Review: ${{ needs.dependency-review.result }}" >> security-report.md
          echo "- CodeQL (.NET): ${{ needs.codeql-backend.result }}" >> security-report.md
          echo "- CodeQL (TS/React): ${{ needs.codeql-frontend.result }}" >> security-report.md
          echo "- NuGet Audit: ${{ needs.nuget-audit.result }}" >> security-report.md
          echo "- npm Audit: ${{ needs.npm-audit.result }}" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: security-report.md
          retention-days: 90

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secrets-scanning, dependency-review, codeql-backend, codeql-frontend, nuget-audit, npm-audit]
    if: always()
    steps:
      - name: Evaluate security gates
        run: |
          BLOCKED=0

          if [ "${{ needs.secrets-scanning.result }}" == "failure" ]; then
            echo "❌ Secrets scanning failed"
            BLOCKED=1
          fi

          if [ "${{ needs.dependency-review.result }}" == "failure" ]; then
            echo "❌ Dependency review failed"
            BLOCKED=1
          fi

          if [ "${{ needs.codeql-backend.result }}" == "failure" ]; then
            echo "❌ CodeQL (.NET) found issues"
            BLOCKED=1
          fi

          if [ "${{ needs.codeql-frontend.result }}" == "failure" ]; then
            echo "❌ CodeQL (TS/React) found issues"
            BLOCKED=1
          fi

          if [ "${{ needs.nuget-audit.result }}" == "failure" ]; then
            echo "❌ NuGet audit found vulnerabilities"
            BLOCKED=1
          fi

          if [ "${{ needs.npm-audit.result }}" == "failure" ]; then
            echo "❌ npm audit found vulnerabilities"
            BLOCKED=1
          fi

          if [ $BLOCKED -eq 1 ]; then
            echo "Security gates FAILED - blocking merge"
            exit 1
          fi

          echo "✅ All security gates passed"