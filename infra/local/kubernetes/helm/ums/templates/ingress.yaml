apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: ums.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ums-api
            port:
              number: 5293
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ums-web
            port:
              number: 5173
  - host: grafana.ums.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
