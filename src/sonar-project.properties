# SonarCloud Integration for UMS Monorepo
sonar.projectKey=ums_arc-nodejs-workspace
sonar.organization=ums-org
sonar.projectName=arc-nodejs-workspace
sonar.projectVersion=1.0.0

# Paths to sources and tests
sonar.sources=apps
sonar.tests=apps
sonar.test.inclusions=apps/**/*.spec.ts,apps/**/*.test.tsx,apps/**/*.spec.tsx
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.spec.ts,**/*.spec.tsx,**/*.test.tsx,apps/web/vite.config.ts

# Code coverage reports
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
