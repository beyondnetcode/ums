services:
  # SQL Server compatible lightweight database for development
  sqlserver-lite:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: ums-sqlserver-lite
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ums-network

  # .NET Backend API
  ums-api:
    build:
      context: .
      dockerfile: apps/ums.api/Ums.Presentation/Dockerfile
    container_name: ums-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver-lite,1433;Database=UmsDev;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False;
      - Persistence__Provider=SqlServer
      - Persistence__UseSqlServerIdentityStores=true
      - Persistence__InitializePlatformStoreOnStartup=true
    ports:
      - "5293:8080"
    depends_on:
      - sqlserver-lite
    networks:
      - ums-network

  # React Frontend
  ums-web:
    build:
      context: .
      dockerfile: apps/ums.web-app/Dockerfile
    container_name: ums-web
    ports:
      - "5173:80"
    depends_on:
      - ums-api
    networks:
      - ums-network

networks:
  ums-network:
    driver: bridge

volumes:
  sqlserver_data:
