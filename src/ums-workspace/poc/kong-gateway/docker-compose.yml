version: '3.9'

x-kong-config:
  &kong-env
  # Modo DB-less
  KONG_DATABASE: "off"
  KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
  # Logs en consola para facilitar el debug local
  KONG_PROXY_ACCESS_LOG: "/dev/stdout"
  KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
  KONG_PROXY_ERROR_LOG: "/dev/stderr"
  KONG_ADMIN_ERROR_LOG: "/dev/stderr"
  # Escuchar en todas las interfaces
  KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
  KONG_PLUGINS: "bundled"

services:
  kong-gateway:
    image: kong:3.6
    container_name: kong-gateway
    environment:
      <<: *kong-env
    ports:
      - "8000:8000" # Proxy público (Donde el frontend hace las peticiones)
      - "8001:8001" # Admin API (Para ver el estado interno de Kong)
    volumes:
      # Montamos el archivo declarativo que creamos
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
    depends_on:
      - nestjs-mock
    networks:
      - kong-net

  # Simulamos nuestro NestJS BFF utilizando un Echo Server
  # Este servidor simplemente devuelve un JSON con todo lo que recibe,
  # lo cual es perfecto para ver cómo Kong modifica la petición y agrega headers.
  nestjs-mock:
    image: ealen/echo-server:latest
    container_name: nestjs-mock
    environment:
      - ENABLE_HOST=true
    ports:
      - "3000:80" # Puedes entrar directo al localhost:3000 para saltarte Kong y ver la diferencia
    networks:
      - kong-net

networks:
  kong-net:
    driver: bridge
