_format_version: "3.0"
_transform: true

services:
  - name: mock-nestjs-bff
    url: http://nestjs-mock:80 # El servidor mock escucha en el puerto 80 internamente
    routes:
      - name: mock-api
        paths:
          - /api
        strip_path: false

    plugins:
      # 1. Plugin de Rate Limiting (Muy bajo para poder probarlo rápido)
      - name: rate-limiting
        enabled: true
        config:
          minute: 5 # Límite de 5 peticiones por minuto por IP
          policy: local
      
      # 2. Plugin de Autenticación por API Key
      # (Usamos API Key en lugar de JWT para el PoC para evitar generar certificados RSA manualmente, pero el concepto de validación es idéntico)
      - name: key-auth
        enabled: true
        config:
          key_names:
            - x-api-key # El header que debe enviar el cliente
          hide_credentials: true # Kong remueve este header antes de enviarlo a NestJS (seguridad)

      # 3. Plugin para inyectar información al BFF
      - name: request-transformer
        enabled: true
        config:
          add:
            headers:
              - x-consumer-id:$(consumer.id)
              - x-consumer-username:$(consumer.username)

consumers:
  - username: frontend-client
    keyauth_credentials:
      - key: "mi-clave-super-secreta-123"
