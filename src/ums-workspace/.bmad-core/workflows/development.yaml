name: Greenfield Development Workflow
description: End-to-end spec-driven development loop for features in the UMS workspace.
version: 1.0.0

steps:
  - id: analysis
    agent: analyst
    action: Analyze requirements, identify potential domain constraints, and construct a functional specification.
    deliverable: ".bmad-core/deliverables/functional-spec.md"

  - id: product-definition
    agent: pm
    action: Refine functional specs into a comprehensive Product Requirements Document (PRD) with UX definitions.
    deliverable: ".bmad-core/deliverables/prd.md"
    dependsOn: [analysis]

  - id: architectural-design
    agent: architect
    action: Define Clean Architecture directories, DB schemas (PostgreSQL), and security (OWASP) parameters.
    deliverable: ".bmad-core/deliverables/technical-architecture.md"
    dependsOn: [product-definition]

  - id: task-breakdown
    agent: sm
    action: Create explicit backlog stories, sequence lists, and "Definition of Done" templates.
    deliverable: ".bmad-core/backlog/tasks.json"
    dependsOn: [architectural-design]

  - id: implementation
    agent: dev
    action: Code backend modules in NestJS and frontend components in Vite + React. Ensure OWASP security.
    deliverable: "apps/api/src/ and apps/web/src/"
    dependsOn: [task-breakdown]

  - id: verification
    agent: qa
    action: Run unit tests, security audits, and layout verifications. Document test logs.
    deliverable: ".bmad-core/deliverables/qa-report.md"
    dependsOn: [implementation]
